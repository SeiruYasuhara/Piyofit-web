<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Piyofit - 毎日3分で変わる</title>
<meta name="description" content="ゲーム感覚でトレーニングが続く。ひよこと一緒に28日間のコースを攻略しよう。">
<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic UI',sans-serif;
  background:#fff;
}

/* NAV */
nav{
  position:fixed;top:0;left:0;right:0;z-index:999;
  background:rgba(255,255,255,0.95);
  backdrop-filter:blur(20px);
  border-bottom:2px solid #E5E5E5;
  height:64px;display:flex;align-items:center;
  padding:0 32px;justify-content:space-between;
}

.logo{
  font-size:22px;font-weight:900;
  color:#2A3F5F;text-decoration:none;
  display:flex;align-items:center;gap:10px;
}

.logo-img{
  width:36px;height:36px;
  object-fit:contain;
}

.btn-primary{
  background:#4A90E2;color:#fff;
  padding:12px 24px;font-size:15px;font-weight:900;
  border-radius:16px;text-decoration:none;
  box-shadow:0 4px 0 #2A7DD4;
  transition:opacity 0.15s;
}
.btn-primary:hover{opacity:0.9;}

/* HERO */
.hero{
  min-height:100vh;
  background:#4A90E2;
  display:flex;align-items:center;justify-content:center;
  padding:80px 32px 60px;
  text-align:center;
}

.hero-inner{max-width:560px;}

.hero-piyo{
  width:200px;height:200px;
  object-fit:contain;
  margin:0 auto 32px;
  display:block;
  animation:float 3s ease-in-out infinite;
  filter:drop-shadow(0 20px 40px rgba(0,0,0,0.2));
}

@keyframes float{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-16px);}
}

h1{
  font-size:clamp(36px,7vw,64px);
  font-weight:900;color:#fff;
  line-height:1.05;letter-spacing:-2px;
  margin-bottom:16px;
}

.hero-sub{
  font-size:clamp(16px,2.5vw,20px);
  color:rgba(255,255,255,0.8);
  line-height:1.7;margin-bottom:40px;
}

.appstore-btn{
  display:inline-block;
  transition:opacity 0.15s,transform 0.15s;
}
.appstore-btn:hover{opacity:0.9;transform:translateY(-2px);}
.appstore-btn img{height:54px;width:auto;}

/* FOOTER */
footer{
  background:#4A90E2;
  padding:32px;
  text-align:center;
  border-top:1px solid rgba(255,255,255,0.15);
}

.footer-links{
  display:flex;gap:24px;justify-content:center;
  margin-bottom:10px;flex-wrap:wrap;
}

.footer-links a{
  font-size:13px;color:rgba(255,255,255,0.6);
  text-decoration:none;transition:color 0.15s;
}
.footer-links a:hover{color:#fff;}
.footer-copy{font-size:12px;color:rgba(255,255,255,0.4);}
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <a href="/" class="logo">
    <img src="piyo.png" alt="Piyofit" class="logo-img">
    Piyofit
  </a>
  <a href="https://apps.apple.com/app/id000000000" class="btn-primary">無料で始める</a>
</nav>

<!-- HERO -->
<section class="hero">
  <div class="hero-inner">
    <img src="piyo.png" alt="Piyofit" class="hero-piyo">
    <h1>毎日3分で<br>人生が変わる</h1>
    <p class="hero-sub">
      ゲーム感覚でトレーニングが続く。<br>
      ひよこと一緒に28日間のコースを攻略しよう。
    </p>
    <a href="https://apps.apple.com/app/id000000000" class="appstore-btn">
      <img src="https://developer.apple.com/assets/elements/badges/download-on-the-app-store.svg" alt="Download on the App Store">
    </a>
  </div>
</section>

<!-- FOOTER -->
<footer>
  <div class="footer-links">
    <a href="/privacy.html">プライバシーポリシー</a>
    <a href="/terms.html">利用規約</a>
    <a href="mailto:support@piyofit.app">お問い合わせ</a>
  </div>
  <div class="footer-copy">© 2026 Piyofit</div>
</footer>

</body>
</html>
